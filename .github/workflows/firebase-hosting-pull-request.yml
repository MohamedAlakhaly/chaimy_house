name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main  # تأكد أن هذا هو اسم فرعك الأساسي

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. تثبيت فلاتر (هذا الجزء هو الذي يمنع خطأ 127)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. تحميل المكتبات
      - name: Install Dependencies
        run: flutter pub get

      # 4. بناء المشروع (مع الحلول التي ناقشناها للشاشة البيضاء والأيقونات)
      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons --no-wasm-dry-run  

      # 5. الرفع إلى فايربيس
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHIMAY_HOUSE }}'
          channelId: live
          projectId: chimay-house